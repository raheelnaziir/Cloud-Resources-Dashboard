apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-dashboard
  namespace: default
  labels:
    app: cloud-dashboard
    version: "1.0.0"
    project: cloud-computing-bscs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloud-dashboard
  template:
    metadata:
      labels:
        app: cloud-dashboard
        version: "1.0.0"
    spec:
      containers:
        - name: cloud-dashboard
          # Replace with your actual ECR image URI:
          # image: <AWS_ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/cloud-dashboard:latest
          image: cloud-dashboard:latest
          imagePullPolicy: IfNotPresent   # Use 'Always' when pulling from ECR
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: AWS_REGION
              value: "us-east-1"
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
      restartPolicy: Always