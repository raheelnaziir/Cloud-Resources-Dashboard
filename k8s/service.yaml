apiVersion: v1
kind: Service
metadata:
  name: cloud-dashboard-service
  namespace: default
  labels:
    app: cloud-dashboard
spec:
  type: NodePort
  selector:
    app: cloud-dashboard
  ports:
    - name: http
      protocol: TCP
      port: 80          # Internal cluster port
      targetPort: 3000  # Container port
      nodePort: 30080   # External port on EC2 (access via EC2-IP:30080)